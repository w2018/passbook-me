name: Build APK and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Ensure debug keystore exists for APK signing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android \
              -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Keystore ready"

      - name: Build Release APK (with R8 shrink)
        run: ./gradlew assembleRelease -Pandroid.aapt2FromMavenOverride=

      - name: List APK output (debug)
        run: ls -la app/build/outputs/apk/release/ || echo "No release dir found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Git Tag and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f build-${{ github.run_number }}
          git push origin build-${{ github.run_number }} --force

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            自动构建 Release APK（R8混淆缩减）
            Commit: ${{ github.sha }}
            分支: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
